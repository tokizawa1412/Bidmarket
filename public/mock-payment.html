<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>Mock Payment</title><style>body{font-family:Arial;background:#f3f4f6;padding:30px}.box{max-width:480px;margin:auto;background:white;padding:24px;border-radius:24px}</style></head><body><div class="box"><h1>จำลองชำระเงิน</h1><button onclick="pay()">ชำระสำเร็จ</button><div id="msg"></div></div><script>const id=new URLSearchParams(location.search).get('id');async function pay(){const r=await fetch('/api/payments/mock-confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payment_id:id})});msg.innerHTML=r.ok?'สำเร็จ':'ไม่สำเร็จ'}</script></body></html>
