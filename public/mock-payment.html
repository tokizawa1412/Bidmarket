<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><title>Mock Payment</title>
<style>body{font-family:Arial;background:#f3f4f6;padding:30px}.box{max-width:480px;margin:auto;background:white;padding:24px;border-radius:24px;box-shadow:0 12px 40px #0001}button{padding:12px 16px;border:0;border-radius:14px;background:#047857;color:white;font-weight:bold}</style></head>
<body><div class="box"><h1>จำลองหน้าชำระเงิน</h1><p>ระบบจริงให้แทนหน้านี้ด้วย Payment Gateway</p><button onclick="pay()">จำลองชำระเงินสำเร็จ</button><div id="msg"></div></div>
<script>
const id=new URLSearchParams(location.search).get('id');
async function pay(){const r=await fetch('/api/payments/mock-confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payment_id:id})});const j=await r.json();msg.innerHTML=r.ok?'<p>ชำระสำเร็จ กลับไปที่เว็บได้</p>':'<p>'+j.error+'</p>'}
</script></body></html>
