<!doctype html><html><meta charset="utf-8"><body><h1>Mock Payment</h1><button onclick="pay()">จำลองชำระสำเร็จ</button><div id="msg"></div><script>const id=new URLSearchParams(location.search).get('id');async function pay(){let r=await fetch('/api/payments/mock-confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payment_id:id})});msg.textContent=r.ok?'สำเร็จ':'ไม่สำเร็จ'}</script></body></html>
