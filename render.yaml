databases:
  - name: bidmarket-db
    plan: free
    databaseName: bidmarket
    user: bidmarket

services:
  - type: web
    name: bidmarket
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bidmarket-db
          property: connectionString
      - key: PGSSLMODE
        value: require
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://bidmarket-lxou.onrender.com/auth/google/callback
      - key: ADMIN_EMAILS
        value: tokizawa1412@gmail.com
      - key: OPENAI_API_KEY
        sync: false
